version: '3.8'

services:
  removebanana:
    build: .
    container_name: removebanana
    restart: unless-stopped
    # No ports exposed to host - only accessible via shared_net
    networks:
      - shared_net
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/outputs:/app/outputs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  shared_net:
    external: true
